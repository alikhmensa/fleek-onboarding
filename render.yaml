services:
  - type: web
    name: fleek-sourcing-copilot
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python -m scripts.seed_inventory"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DB_DIR
        value: /var/data
      - key: GOOGLE_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
